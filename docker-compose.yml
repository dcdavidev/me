services:
  traefik:
    image: traefik:v2.11
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    environment:
      - DOCKER_API_VERSION=1.44
      - ACME_EMAIL=${ACME_EMAIL}
    command:
      - '--log.level=DEBUG'

      - '--providers.docker=true'
      - '--providers.docker.swarmMode=true'
      - '--providers.docker.exposedByDefault=false'
      - '--providers.docker.endpoint=unix:///var/run/docker.sock'

      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
      - '--entrypoints.web.http.redirections.entryPoint.to=websecure'
      - '--entrypoints.web.http.redirections.entryPoint.scheme=https'

      - '--certificatesresolvers.myresolver.acme.httpchallenge=true'
      - '--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web'
      - '--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}'
      - '--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    deploy:
      placement:
        constraints:
          - node.role == manager
    networks:
      - webnet

  me:
    image: dcdavidev/me:${TAG:-latest}
    environment:
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - HOST=${HOST}
      - PORT=${PORT:-3000}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:${PORT:-3000}/health || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == manager
      labels:
        - 'traefik.enable=true'
        - 'traefik.http.routers.me.rule=Host(`${HOST}`) || Host(`www.${HOST}`)'
        - 'traefik.http.routers.me.entrypoints=websecure'
        - 'traefik.http.routers.me.tls=true'
        - 'traefik.http.routers.me.tls.certresolver=myresolver'
        - 'traefik.http.services.me.loadbalancer.server.port=${PORT:-3000}'
        - 'traefik.docker.network=me_webnet'
        - 'traefik.http.routers.me.service=me'
      restart_policy:
        condition: on-failure
    networks:
      - webnet

networks:
  webnet:
    driver: overlay
    attachable: true

volumes:
  traefik-certificates:
