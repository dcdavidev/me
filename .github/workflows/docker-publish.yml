name: Publish and Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/me

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_ENV=production

  deploy:
    name: Deploy to Docker Swarm
    runs-on: ubuntu-latest
    needs: push_to_registry
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'docker-compose.yml'
          target: '~/'

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          PORT: ${{ secrets.PORT }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          HOST: ${{ secrets.HOST }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SERVICE: ${{ secrets.EMAIL_SERVICE }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PORT,NODE_ENV,HOST,ACME_EMAIL,EMAIL_PASSWORD,EMAIL_SERVICE,EMAIL_USER
          script: |
            echo "PORT=$PORT" > .env
            echo "NODE_ENV=$NODE_ENV" >> .env
            echo "HOST=$HOST" >> .env
            echo "ACME_EMAIL=$ACME_EMAIL" >> .env
            echo "EMAIL_PASSWORD=$EMAIL_PASSWORD" >> .env
            echo "EMAIL_SERVICE=$EMAIL_SERVICE" >> .env
            echo "EMAIL_USER=$EMAIL_USER" >> .env
            echo "TAG=${{ needs.push_to_registry.outputs.tag }}" >> .env

            export NODE_ENV=$NODE_ENV
            export PORT=$PORT
            export HOST=$HOST
            export ACME_EMAIL=$ACME_EMAIL
            export EMAIL_PASSWORD=$EMAIL_PASSWORD
            export EMAIL_SERVICE=$EMAIL_SERVICE
            export EMAIL_USER=$EMAIL_USER
            export TAG=${{ needs.push_to_registry.outputs.tag }}


            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/me:${{ needs.push_to_registry.outputs.tag }}

            docker stack deploy -c docker-compose.yml --with-registry-auth me

            echo "Starting cleanup of old images..."
            OLD_IMAGES=$(docker images "${{ secrets.DOCKERHUB_USERNAME }}/me" --format "{{.ID}}" | tail -n +4)
            if [ -n "$OLD_IMAGES" ]; then
              docker rmi $OLD_IMAGES || true
              echo "Old images removed."
            else
              echo "No images to remove (fewer than 3 present)."
            fi
            docker image prune -f
