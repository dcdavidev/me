name: Publish and Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/me

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_ENV=production

  deploy:
    name: Deploy to Docker Swarm
    runs-on: ubuntu-latest
    needs: push_to_registry
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install Infisical CLI
        run: |
          curl -1sLf \
          'https://artifacts-cli.infisical.com/setup.deb.sh' \
          | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical
          infisical --version

      - name: Fetch secrets from Infisical
        env:
          CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: |
          INFISICAL_TOKEN=$(infisical login \
            --method=universal-auth \
            --client-id="${{ secrets.INFISICAL_CLIENT_ID }}" \
            --client-secret="${{ secrets.INFISICAL_CLIENT_SECRET }}" \
            --domain="https://eu.infisical.com" \
            --plain)

          if [ -z "$INFISICAL_TOKEN" ]; then echo "Login failed"; exit 1; fi

          infisical export \
            --token=$INFISICAL_TOKEN \
            --domain https://eu.infisical.com \
            --projectId="$PROJECT_ID" \
            --env=prod \
            --path=/apps/me \
            --silent > .env

          echo "TAG=${{ needs.push_to_registry.outputs.tag }}" >> .env

      - name: Copy Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'docker-compose.yml,.env'
          target: '~/'

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export $(grep -v '^#' .env | xargs)

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/me:${{ needs.push_to_registry.outputs.tag }}

            docker-compose --env-file .env config > deploy-config.yml

            docker stack deploy -c deploy-config.yml --with-registry-auth me

            echo "Starting cleanup of old images..."
            OLD_IMAGES=$(docker images "${{ secrets.DOCKERHUB_USERNAME }}/me" --format "{{.ID}}" | tail -n +4)
            if [ -n "$OLD_IMAGES" ]; then
              docker rmi $OLD_IMAGES || true
            fi
            docker image prune -f
            rm deploy-config.yml
